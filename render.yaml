services:
  # Backend: FastAPI Web Service
  - type: web
    name: vaayuu-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    # Forced to 1 worker for data consistency and memory optimization on free tier
    startCommand: gunicorn api.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      - key: RENDER
        value: true
      - key: SMS_COOLDOWN_SECONDS
        value: 300
      - key: PYTHON_VERSION
        value: 3.11.9
